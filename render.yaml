services:
  - type: web
    name: overcard-api
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: overcard-db
          property: connectionString

databases:
  - name: overcard-db
    plan: free
    databaseName: overcard
    user: overcard
